apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-bot
  namespace: devops-bot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devops-bot-admin
  namespace: devops-bot
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devops-bot-admin
  namespace: devops-bot
subjects:
  - kind: ServiceAccount
    name: devops-bot
    namespace: devops-bot
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: devops-bot-admin
